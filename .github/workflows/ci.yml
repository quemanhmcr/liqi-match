name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_VARIANT: development
  EXPO_PUBLIC_API_URL: http://localhost:3000
  EXPO_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
  EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ci-publishable-key
  EXPO_PUBLIC_MEDIA_BASE_URL: http://127.0.0.1:8787

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm run security:audit

      - name: Expo Doctor
        run: npx expo-doctor

      - name: Check generated Core V1 contracts
        run: npm run contracts:check

      - name: Check completed product authority surfaces
        run: npm run product-completion-v2:check

      - name: Check production authority invariants
        run: |
          npm run match-authority:check
          npm run conversation-authority:check

      - name: Check formatting
        run: npm run format:check

      - name: Check repository operating contract
        run: npm run repository:check

      - name: Validate asset manifest and bundle budget
        run: npm run assets:check

      - name: Check architecture and shared UI language
        run: npm run architecture:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test:ci

      - name: Worktree workflow self-test
        run: npm run worktree:self-test

      - name: Web export smoke test
        run: npx expo export --platform web

  supabase:
    name: Supabase checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.109.0

      - name: Start Supabase
        shell: bash
        run: |
          set -o pipefail
          log_file="$RUNNER_TEMP/supabase-start.log"
          if supabase start 2>&1 | tee "$log_file"; then
            exit 0
          fi

          {
            echo "### Supabase start failure"
            echo '```text'
            tail -n 120 "$log_file"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          python - "$log_file" <<'PYTHON'
          import pathlib
          import re
          import sys

          text = pathlib.Path(sys.argv[1]).read_text(
              encoding="utf-8",
              errors="replace",
          )
          text = re.sub(r"\x1b\[[0-9;]*[A-Za-z]", "", text)
          error_index = text.rfind("\nERROR:")
          if error_index < 0:
              error_index = text.rfind("ERROR:")
          excerpt = (
              text[error_index : error_index + 10000]
              if error_index >= 0
              else text[-10000:]
          )
          escaped = (
              excerpt.replace("%", "%25")
              .replace("\r", "%0D")
              .replace("\n", "%0A")
          )
          print(f"::error title=Supabase start failure::{escaped}")
          PYTHON
          exit 1

      - name: Reset database
        run: supabase db reset

      - name: Lint database
        run: supabase db lint

      - name: Test database
        shell: bash
        run: |
          set -o pipefail
          log_file="$RUNNER_TEMP/supabase-test.log"
          if supabase test db 2>&1 | tee "$log_file"; then
            exit 0
          fi

          {
            echo "### Supabase pgTAP failure"
            echo '```text'
            tail -n 220 "$log_file"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          python - "$log_file" <<'PYTHON'
          import pathlib
          import re
          import sys

          text = pathlib.Path(sys.argv[1]).read_text(
              encoding="utf-8",
              errors="replace",
          )
          text = re.sub(r"\x1b\[[0-9;]*[A-Za-z]", "", text)
          lines = text.splitlines()
          patterns = (
              "psql:",
              "ERROR:",
              "not ok",
              "Bail out!",
              "Failed test",
              "Failed tests:",
              "Parse errors:",
              "You planned",
          )
          blocks = []
          for index, line in enumerate(lines):
              if "psql:" in line and "ERROR:" in line:
                  blocks.append(
                      "\n".join(
                          lines[max(0, index - 2) : min(len(lines), index + 14)]
                      )
                  )
              elif line.lstrip().startswith("not ok"):
                  blocks.append(
                      "\n".join(
                          lines[max(0, index - 2) : min(len(lines), index + 12)]
                      )
                  )
          selected = [
              line for line in lines if any(pattern in line for pattern in patterns)
          ]
          if selected:
              blocks.append("\n".join(selected[-120:]))
          if not blocks:
              blocks.append(text[-18000:])

          for index, block in enumerate(blocks[:40], start=1):
              escaped = (
                  block[-14000:]
                  .replace("%", "%25")
                  .replace("\r", "%0D")
                  .replace("\n", "%0A")
              )
              print(
                  f"::error title=Supabase pgTAP failure {index}::{escaped}"
              )
          PYTHON
          exit 1

      - name: Preload postgres-meta image
        run: |
          docker pull ghcr.io/supabase/postgres-meta:v0.96.1
          docker tag ghcr.io/supabase/postgres-meta:v0.96.1 public.ecr.aws/supabase/postgres-meta:v0.96.1

      - name: Generate database types
        shell: bash
        run: |
          supabase gen types typescript --local > /tmp/database.types.ts
          test -s /tmp/database.types.ts
          grep -q "media_assets" /tmp/database.types.ts

  media-worker:
    name: Cloudflare media worker
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: cloudflare/media-worker/package-lock.json

      - name: Install dependencies
        working-directory: cloudflare/media-worker
        run: npm ci

      - name: Typecheck
        working-directory: cloudflare/media-worker
        run: npm run typecheck

      - name: Test
        working-directory: cloudflare/media-worker
        run: npm test

      - name: Wrangler dry run
        working-directory: cloudflare/media-worker
        env:
          SUPABASE_SERVICE_ROLE_KEY: dry-run-service-role-key
        run: npm run deploy:dry-run
