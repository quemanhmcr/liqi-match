project_id = "liqi_match"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.pooler]
enabled = false

[realtime]
enabled = true

[studio]
enabled = true
port = 54323

[local_smtp]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:8081"
additional_redirect_urls = ["exp://127.0.0.1:8081"]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083

[functions.media-create-upload]
verify_jwt = true

[functions.media-finalize-upload]
verify_jwt = true

[functions.media-delete]
verify_jwt = true

[functions.account-delete]
verify_jwt = true
